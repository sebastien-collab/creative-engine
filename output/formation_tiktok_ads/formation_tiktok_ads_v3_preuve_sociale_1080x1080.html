<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    .creative {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(135deg, #2d1b4e 0%, #1a1a2e 100%);
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 60px;
    }
    
    .creative::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .badge {
      position: absolute;
      top: 40px;
      right: 40px;
      background: #FE2C55;
      color: white;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 900;
      font-size: 24px;
      transform: rotate(8deg);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      z-index: 10;
    }
    
    .product-img {
      width: 400px;
      height: 400px;
      object-fit: contain;
      margin-bottom: 40px;
      filter: drop-shadow(0 25px 50px rgba(0,0,0,0.25));
      z-index: 5;
    }
    
    .headline {
      font-size: 64px;
      font-weight: 900;
      color: #FFFFFF;
      text-align: center;
      line-height: 1.15;
      max-width: 90%;
      margin-bottom: 20px;
      z-index: 5;
    }
    
    .subheadline {
      font-size: 30px;
      color: #FFFFFF;
      opacity: 0.95;
      text-align: center;
      margin-bottom: 50px;
      font-weight: 600;
      z-index: 5;
    }
    
    .cta {
      background: #FFD700;
      color: #000000;
      padding: 28px 64px;
      border-radius: 60px;
      font-size: 26px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 15px 40px rgba(0,0,0,0.35);
      display: inline-block;
      z-index: 5;
    }
    
    .decoration {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }
    
    .decoration-1 {
      width: 300px;
      height: 300px;
      bottom: -100px;
      left: -100px;
    }
    
    .decoration-2 {
      width: 200px;
      height: 200px;
      top: 100px;
      right: -50px;
    }
  </style>
</head>
<body>
  <div class="creative">
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    <div class="badge">TOP RATED</div>
    <img class="product-img" src="https://via.placeholder.com/400x400/FFD700/000000?text=Formation+TikTok" alt="">
    <div class="headline">Rejoins les 500+ media buyers formés</div>
    <div class="subheadline">La méthode validée par les pros de l'Ads</div>
    <div class="cta">Réserver ma place</div>
  </div>
</body>
</html>
